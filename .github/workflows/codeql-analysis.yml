name: CodeQL Analysis

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '28 4 * * 1'

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
